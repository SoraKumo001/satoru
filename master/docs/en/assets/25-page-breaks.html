<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }
        .page {
            height: 1000px;
            border: 2px solid #ccc;
            margin-bottom: 20px;
            padding: 20px;
            page-break-after: always;
            break-after: page;
        }
        h1 { color: #333; }
        p { line-height: 1.5; }
    </style>
</head>
<body>
    <div class="page">
        <h1>Page 1</h1>
        <p>This is the first page.</p>
        <p>It should have a page break after it.</p>
    </div>
    <div class="page">
        <h1>Page 2</h1>
        <p>This is the second page.</p>
    </div>
</body>
</html>
