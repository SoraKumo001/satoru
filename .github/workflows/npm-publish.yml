name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VCPKG_ROOT: /usr/local/share/vcpkg
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg_cache,readwrite"
      VCPKG_DOWNLOADS: "${{ github.workspace }}/vcpkg_downloads"
      EMSDK_VERSION: "4.0.15"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache vcpkg downloads
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_downloads
          key: vcpkg-downloads-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-downloads-

      - name: Pre-download gumbo
        run: |
          mkdir -p ${{ github.workspace }}/vcpkg_downloads
          if [ ! -f ${{ github.workspace }}/vcpkg_downloads/gumbo-0.13.2.tar.gz ]; then
            curl -L --retry 5 --retry-delay 10 -o ${{ github.workspace }}/vcpkg_downloads/gumbo-0.13.2.tar.gz https://codeberg.org/gumbo-parser/gumbo-parser/archive/0.13.2.tar.gz
          fi

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'triplets/**') }}-${{ github.run_id }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'triplets/**') }}-
            vcpkg-${{ runner.os }}-

      - name: Install Ninja & ccache
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ccache

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-wasm-publish

      - name: Cache Emscripten
        uses: actions/cache@v4
        with:
          path: emsdk-cache
          key: ${{ runner.os }}-emsdk-${{ env.EMSDK_VERSION }}-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-emsdk-${{ env.EMSDK_VERSION }}-

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v16
        with:
          version: ${{ env.EMSDK_VERSION }}
          actions-cache-folder: "emsdk-cache"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache Skia Source
        uses: actions/cache@v4
        with:
          path: external/skia
          key: skia-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            skia-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wasm Configure
        run: pnpm wasm:configure
        env:
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache

      - name: Wasm Build
        run: pnpm wasm:build

      - name: Build TS Packages
        run: pnpm run build:js

      - name: Install Playwright Browsers
        run: pnpm --filter visual-test exec playwright install chromium --with-deps

      - name: Generate Reference PNGs
        run: pnpm --filter visual-test generate-reference

      - name: Run Visual Tests
        run: pnpm --filter visual-test test

      - name: Run Release Check
        run: pnpm release:check

      - name: Publish to npm
        run: |
          # Extract version from tag (e.g. v1.2.3 -> 1.2.3)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Publishing version $VERSION"

          # Ensure the tag matches the package version.
          PACKAGE_VERSION=$(node -p "require('./packages/satoru/package.json').version")
          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $VERSION does not match package version $PACKAGE_VERSION"
            exit 1
          fi

          # Publish
          pnpm --filter satoru-render publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
