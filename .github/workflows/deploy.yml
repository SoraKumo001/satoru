name: Deploy to GitHub Pages

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages-${{ github.ref_name }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VCPKG_ROOT: /usr/local/share/vcpkg
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg_cache,readwrite"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'triplets/**') }}-${{ github.run_id }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'triplets/**') }}-
            vcpkg-${{ runner.os }}-

      - name: Install Ninja & ccache
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ccache

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-wasm

      - name: Cache Emscripten
        uses: actions/cache@v4
        with:
          path: emsdk-cache
          key: ${{ runner.os }}-emsdk-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-emsdk-

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
          actions-cache-folder: "emsdk-cache"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache Skia Source
        uses: actions/cache@v4
        with:
          path: external/skia
          key: skia-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            skia-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wasm Configure
        run: pnpm wasm:configure
        env:
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache

      - name: Wasm Build
        run: pnpm wasm:build

      - name: ccache stats
        run: ccache -s

      - name: Build TS Packages
        run: pnpm run build:js

      - name: Install Playwright Browsers
        run: pnpm --filter visual-test exec playwright install chromium --with-deps

      - name: Generate Reference PNGs
        run: pnpm --filter visual-test generate-reference

      - name: Run Visual Tests
        run: pnpm --filter visual-test test

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: packages/playground/dist
          target-folder: ${{ github.ref_name }}
          branch: gh-pages
          clean: false

      - name: Update Index Page
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          for i in {1..10}; do
            git fetch origin gh-pages || true
            if git ls-remote --exit-code --heads origin gh-pages; then
              git checkout -B gh-pages origin/gh-pages
              
              # Generate index.html
              echo "<!DOCTYPE html><html><head><title>Satoru Render - Branch Previews</title>" > index.html
              echo "<style>body{font-family:sans-serif;padding:40px;line-height:1.6;}ul{list-style:none;padding:0;}li{margin:10px 0;}a{text-decoration:none;color:#0366d6;}a:hover{text-decoration:underline;}</style>" >> index.html
              echo "</head><body><h1>Satoru Render Previews</h1><ul>" >> index.html
              
              # Get list of remote branches
              BRANCHES=$(git ls-remote --heads origin | awk -F'refs/heads/' '{print $2}')
              
              for d in */ ; do
                BN=$(basename "$d")
                if [ "$BN" != "node_modules" ] && [ "$BN" != "assets" ] && [ -d "$d" ]; then
                  if echo "$BRANCHES" | grep -qxw "$BN"; then
                    echo "<li><a href=\"./$BN/\">$BN</a></li>" >> index.html
                  fi
                fi
              done
              
              echo "</ul></body></html>" >> index.html
              
              git add index.html
              if git commit -m "Update index page"; then
                if git push origin gh-pages; then
                  exit 0
                fi
              else
                exit 0
              fi
            else
              echo "gh-pages branch not found, skipping index update"
              exit 0
            fi
            sleep $(( i * 2 ))
          done
          exit 1

